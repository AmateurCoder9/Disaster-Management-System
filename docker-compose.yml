version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - JWT_SECRET=change-this-secret-in-production-123
      - CORS_ORIGINS=http://localhost:3000
      - SEED_DB=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Important: this tells the Vite build to point at the docker host's localhost 
        # so the browser can reach it. It's not a container-to-container call.
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
